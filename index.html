<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Palindrome - Checker</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <h1 class="start">Is it a Palindrome?</h1>

  <div class="main" id="container">
    <p class="text">Enter text to check for a palindrome:</p>
    <div class="controls">
      <input id="text-input" type="text" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Text to check">
      <button id="check-btn" type="button" aria-label="Check palindrome">Check</button>
    </div>
    <div id="result" role="status" aria-live="polite"></div>
  </div>

  <div class="describe">
    <p class="describe-text">💡 A palindrome is a word or sentence that's spelled the same way both forward and backward, ignoring punctuation, case, and spacing.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
