<!doctype html>
<html lang="en">
    <head>

        <title>Palindrome - Checker</title>
        <link rel="stylesheet" href="styles.css">

    </head>

    <body>
        <p class="start"> Is it a Palindrome?</p>

        <div class="main">
            <p class="text">Enter in text to check for a palindrome:</p>
            <input id="text-input">
            <button id="check-btn">Check</button>
            <div id="result"></div>
        </div>

        <div class="describe">
            <p class="describe-text">💡 A palindrome is a word or sentence that's spelled the same way both forward and backward, ignoring punctuation, case, and spacing.</p>
        </div>
        <script src="script.js"> </script>
    </body>
</html>
